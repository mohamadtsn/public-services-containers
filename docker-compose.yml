services:
  mysql:
    image: 'mysql:8.0'
    container_name: mysql-main
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    ports:
      - '${MYSQL_PORT:-43306}:3306'
    environment:
      MYSQL_DATABASE: '${MYSQL_DATABASE:-main}'
      MYSQL_USER: '${MYSQL_USER:-main_user}'
      MYSQL_PASSWORD: '${MYSQL_PASSWORD:-password}'
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:-root}'
      MYSQL_ALLOW_EMPTY_PASSWORD: '${MYSQL_ALLOW_EMPTY_PASSWORD:-yes}'
    volumes:
      - './data/mysql:/var/lib/mysql'
      - './mysql/conf.d:/etc/mysql/conf.d:ro'
    networks:
      - public-service-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      retries: 5
      timeout: 5s

  redis:
    image: 'redis:6.0.17-alpine'
    container_name: redis-main
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-46379}:6379'
    command: redis-server --appendonly yes
    volumes:
      - './data/redis:/data'
    networks:
      - public-service-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3
      timeout: 5s

  phpmyadmin:
    image: 'phpmyadmin/phpmyadmin'
    container_name: phpmyadmin
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      PMA_HOST: mysql-main
      PMA_PORT: '3306'
      PMA_USER: 'root'
      PMA_PASSWORD: '${MYSQL_ROOT_PASSWORD:-root}'
      UPLOAD_LIMIT: 128M
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      nginx:
        condition: service_started
    networks:
      - public-service-network
    ports:
      - '${PMA_PORT:-18080}:80'
    volumes:
      - 'main-phpmyadmin:/sessions'
      - './phpmyadmin/config.inc.php:/var/www/html/config.inc.php'

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx-main
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - './nginx/site-enabled/:/etc/nginx/conf.d/'
      - './nginx/certificates/:/etc/nginx/ssl/:ro'
      - './nginx/settings/nginx.conf:/etc/nginx/nginx.conf:ro'
    networks:
      - public-service-network

networks:
  public-service-network:
    name: 'public-service-network'
    driver: bridge

volumes:
  main-phpmyadmin:
    driver: local
