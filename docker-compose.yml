services:
  mysql:
    image: 'mysql:8.0'
    container_name: ${MYSQL_CONTAINER_NAME:-mysql-main}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    ports:
      - '${MYSQL_PORT:-43306}:3306'
    environment:
      MYSQL_DATABASE: '${MYSQL_DATABASE:-main}'
      MYSQL_USER: '${MYSQL_USER:-main_user}'
      MYSQL_PASSWORD: '${MYSQL_PASSWORD:-password}'
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:-root}'
      MYSQL_ALLOW_EMPTY_PASSWORD: '${MYSQL_ALLOW_EMPTY_PASSWORD:-no}'
    volumes:
      - './data/mysql:/var/lib/mysql'
      - './mysql/conf.d:/etc/mysql/conf.d:ro'
    networks:
      - public-service-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      retries: 5
      timeout: 5s

  redis:
    image: 'redis:7.2-alpine'
    container_name: ${REDIS_CONTAINER_NAME:-redis-main}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-46379}:6379'
    command: redis-server --appendonly yes
    volumes:
      - './data/redis:/data'
    networks:
      - public-service-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3
      timeout: 5s

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ${NGINX_CONTAINER_NAME:-nginx-main}
    profiles:
      - proxy
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    ports:
      - '${NGINX_HTTP_PORT:-80}:80'
      - '${NGINX_HTTPS_PORT:-443}:443'
    volumes:
      - './nginx/site-enabled/:/etc/nginx/conf.d/'
      - './nginx/certificates/:/etc/nginx/ssl/:ro'
      - './nginx/static/:/srv/static/:ro'
    networks:
      - public-service-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  phpmyadmin:
    image: 'phpmyadmin/phpmyadmin'
    container_name: ${PMA_CONTAINER_NAME:-phpmyadmin}
    profiles:
      - pma
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      PMA_HOST: '${MYSQL_CONTAINER_NAME:-mysql-main}'
      PMA_PORT: '3306'
      PMA_BLOWFISH_SECRET: '${PMA_BLOWFISH_SECRET:-change-this-to-a-32-char-string!!}'
      UPLOAD_LIMIT: 512M
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - public-service-network
    ports:
      - '${PMA_PORT:-18080}:80'
    volumes:
      - 'main-phpmyadmin:/sessions'

  mailpit:
    image: 'axllent/mailpit:latest'
    container_name: ${MAILPIT_CONTAINER_NAME:-mailpit}
    profiles:
      - mail
    restart: unless-stopped
    ports:
      - '${MAILPIT_SMTP_PORT:-1025}:1025'
      - '${MAILPIT_HTTP_PORT:-8025}:8025'
    networks:
      - public-service-network

  minio:
    image: 'minio/minio:latest'
    container_name: ${MINIO_CONTAINER_NAME:-minio}
    profiles:
      - storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: '${MINIO_ROOT_USER:-minioadmin}'
      MINIO_ROOT_PASSWORD: '${MINIO_ROOT_PASSWORD:-minioadmin}'
    restart: unless-stopped
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - './data/minio:/data'
    networks:
      - public-service-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  public-service-network:
    name: '${NETWORK_NAME:-public-service-network}'
    driver: bridge

volumes:
  main-phpmyadmin:
    driver: local
