name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    uses: ./.github/workflows/validate.yml

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build release archive
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARCHIVE_NAME="public-services-containers-${VERSION}.tar.gz"

          tar -czf "/tmp/$ARCHIVE_NAME" \
            --transform "s|^\.|public-services-containers-${VERSION#v}|" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.idea' \
            --exclude='data/mysql' \
            --exclude='data/redis' \
            --exclude='data/minio' \
            --exclude='*.log' \
            --exclude='scripts/release.sh' \
            --exclude='.shellcheckrc' \
            --exclude='.gitignore' \
            .

          mv "/tmp/$ARCHIVE_NAME" .
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Public Services Containers ${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: true
          files: ${{ env.ARCHIVE_NAME }}